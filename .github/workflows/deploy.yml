name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json # Point to your app folder
      - name: Install dependencies
        run: npm install
        working-directory: app # Run this inside the app folder
      - name: Build
        run: npm run build
        working-directory: app # Build inside the app folder
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to where Vite puts the finished files
          path: app/dist 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4